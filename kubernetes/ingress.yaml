apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-text-analyzer-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ai-analyzer.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-text-analyzer-service
            port:
              number: 80
